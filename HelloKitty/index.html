<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兔宝新年快乐v3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .bg-img {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain; /* 确保完整显示图片 */
            z-index: -1;
            background-color: black; /* 避免空白 */
        }
        body {
            margin-top: -50px; /* 负值让文本框向上移动 */
            height: 100vh; /* 让 body 充满整个视口 */
            display: flex;
            justify-content: center; /* 水平居中 */
            align-items: center; /* 垂直居中 */
            text-align: center;
            color: white; /* 文字颜色 */
            font-size: 20px; /* 文字大小 */
            font-weight: bold; /* 文字加粗 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 0 12%; /* 让整体内容离屏幕左右边远一点 */
        }
        .text-box {
            color: rgb(229, 135, 13);
            padding: 40px 40px;
            border-radius: 10px; /* 圆角 */
            text-align: left; /* 文字左对齐 */
            line-height: 1.3;
            font-family: "KaiTi", "STKaiti", cursive; /* 设置行书字体 */
            align-items: center; /* 让文字和图片在一行对齐 */

        }
        .text-box img {
            width: 36px; /* 图片宽度 */
            height: 36px; /* 图片高度 */
            border-radius: 50%; /* 让图片变成圆形 */
            margin: 0 0px; /* 让图片和文字之间有间距 */
            object-fit: cover; /* 保证图片不会变形 */
        }
    </style>
</head>
<body>
    <img src="background.png" alt="背景" class="bg-img">

    <div class="text-box">
        <div class="main_body">
            <p>To <img src="avatar.jpeg"> 兔宝:</p>
            <p>巳巳如意，福多顺意；欢愉且胜意，万事皆可期；去岁千般皆如愿，今年万事定称心！🍬</p>
            <br>
            <p>愿你在蛇年里像灵蛇一样机智敏捷，生活充满惊喜，每天开开心心🎤歌，烦恼统统“蛇”光光！🐍祝兔宝 新年快乐，蛇年大吉！🎉🎉❤️❤️</p>
           
        </div>
        <br>
        <div style="font-size: 16px;">
            <p>From 云川</p>
            <p>2025.1.29</p>
            <p>乙巳肖蛇年正月初一</p>
        </div>
        
    </div>
</body>
</html>
